# ══════════════════════════════════════════════════════════════════════
#  Universe Definitions
#  Defines the pools of tickers available for screening.
#  The ACTIVE watchlist lives in signals.yaml (single source of truth).
# ══════════════════════════════════════════════════════════════════════

# Which universe to use for the ranking screener
active_universe: sp500

universes:

  # S&P 500 — primary screening universe
  sp500:
    description: "S&P 500 — main universe for ranking and backtesting"
    source: fmp
    auto_fetch: true
    filters:
      min_market_cap: 2.0e9
      min_avg_volume: 500000

  # Mexican stocks (supplementary, via yfinance)
  # mx_stocks:
  #   description: "Top liquid BMV stocks"
  #   source: yfinance
  #   tickers:
  #     - PINFRA.MX
  #     - GFNORTEO.MX
  #     - WALMEX.MX

# Factor proxies for attribution analysis
factor_proxies:
  market: SPY
  size: IWM
  value: IWD
  growth: IWF
  momentum: MTUM
  quality: QUAL
  low_vol: USMV
