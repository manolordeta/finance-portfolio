# ══════════════════════════════════════════════════════════════════════
#  MM QUANT CAPITAL — Master Configuration
#  Single source of truth for all system parameters.
#  Last updated: 2026-03-30
# ══════════════════════════════════════════════════════════════════════


# ── Global ──────────────────────────────────────────────────────────
global:
  risk_free_rate: 0.045           # US treasury ~4.5%
  benchmark: SPY
  llm_provider: deepseek
  llm_model: deepseek-chat        # single source for all LLM usage


# ── Watchlist (active portfolio + monitoring) ───────────────────────
# Single source of truth for tickers under active monitoring.
# Alert system + portfolio optimizer read from here.
watchlist:
  active:
    - MU
    - CIEN
    - STX
    - LITE
    - CVNA
    - WDC
    - FIX
    - BSX
    - TER
    - ALB
    - MELI
    - SATS
    - CF
    - LEN
  auto_add_top_n: 10              # also monitor top N from ranking


# ── Signal Registry ─────────────────────────────────────────────────
# enabled: include in composite scoring
# IC values from walk-forward backtesting
# verdict: STRONG | PASS | WEAK | FAIL | MEASURING

signals:
  technical:
    - name: momentum_12_1
      enabled: true
      ic_21d: 0.024
      ic_63d: 0.023
      verdict: STRONG

    - name: momentum_1m
      enabled: true
      ic_21d: 0.009
      ic_63d: -0.015
      verdict: WEAK

    - name: rsi_14
      enabled: false
      ic_21d: -0.008
      verdict: FAIL

    - name: macd_signal
      enabled: true
      ic_21d: 0.019
      ic_63d: -0.013
      verdict: PASS

    - name: bollinger_position
      enabled: false
      ic_21d: -0.010
      verdict: FAIL

    - name: volume_ratio
      enabled: true
      ic_21d: 0.022
      verdict: PASS

  fundamental:
    - name: pe_relative
      enabled: true
      ic_21d: 0.003
      verdict: WEAK

    - name: ev_ebitda_relative
      enabled: true
      ic_21d: 0.005
      verdict: WEAK

    - name: fcf_yield
      enabled: true
      ic_21d: 0.008
      ic_63d: 0.015
      verdict: PASS

    - name: roe
      enabled: true
      ic_21d: 0.006
      ic_63d: 0.012
      verdict: PASS

    - name: gross_margin_delta
      enabled: true
      ic_21d: 0.004
      verdict: WEAK

    - name: earnings_surprise
      enabled: true
      ic_21d: 0.015
      ic_63d: 0.020
      verdict: STRONG

    - name: revenue_growth
      enabled: true
      ic_21d: 0.010
      ic_63d: 0.018
      verdict: STRONG

    - name: debt_equity_inv
      enabled: true
      ic_21d: 0.005
      verdict: WEAK

  valuation:
    - name: golden_cross
      enabled: true
      ic_21d: 0.014
      ic_63d: 0.030
      verdict: STRONG

    - name: mean_reversion_63d
      enabled: true
      ic_21d: -0.006
      ic_63d: 0.019
      verdict: STRONG_63D_ONLY

    - name: price_vs_sma50
      enabled: true
      ic_21d: -0.010
      ic_63d: 0.015
      verdict: PASS_63D_ONLY

    - name: price_vs_21d
      enabled: true
      ic_21d: -0.008
      ic_63d: 0.012
      verdict: PASS_63D_ONLY

    - name: price_vs_sma200
      enabled: false
      verdict: FAIL

    - name: drawdown_from_high
      enabled: false
      verdict: FAIL

    - name: distance_from_low
      enabled: false
      verdict: FAIL

  sentiment:
    - name: llm_sentiment
      enabled: false             # DISABLED until forward IC is measured
      ic_21d: null               # forward measurement started 2026-03-26
      verdict: MEASURING
      # Re-enable after 3 months of forward data confirms IC > 0.03


# ── Composite Scoring ───────────────────────────────────────────────
composite:
  weighting: auto                 # auto = proportional to IC
  horizon: 21d
  min_signals: 5
  horizon_overrides:
    21d:
      exclude: [mean_reversion_63d, price_vs_sma50, price_vs_21d]
    63d:
      exclude: [momentum_1m, macd_signal]


# ── Ranking ─────────────────────────────────────────────────────────
ranking:
  universe: sp500
  top_n_display: 25
  bottom_n_display: 15
  quintile_threshold: 0.20


# ── Portfolio Optimization (run_portfolio.py) ───────────────────────
portfolio:
  max_weight: 0.10                # per position
  max_sector_weight: 0.50         # per sector
  max_positions: 15               # for discover mode
  default_method: max_sharpe      # max_sharpe | target_vol
  target_volatility_pct: 35.0     # when method = target_vol

  # B-L specific
  tau: 0.05
  risk_aversion: 2.5
  view_scale: 0.15

  # GARCH
  covariance_method: garch_adjusted

  # Efficient frontier
  frontier_points: 25
  show_unconstrained: true


# ── Alert System ────────────────────────────────────────────────────
alerts:
  enabled: true
  frequency: daily
  temperature: 0.1
  max_tokens: 600
  severity:
    high: 0.7
    medium: 0.4
    low: 0.0


# ── Scheduling ──────────────────────────────────────────────────────
schedule:
  daily_run_time: "18:00"
  timezone: "America/Mexico_City"
  daily_tasks:
    - refresh_prices
    - compute_signals
    - compute_ranking
    - run_alerts
  weekly_tasks:
    - refresh_fundamentals
    - batch_sentiment
  monthly_tasks:
    - recalibrate
